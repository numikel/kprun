name: CI
on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pin-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Reject unpinned actions
        run: |
          set -euo pipefail
          if grep -rEn 'uses:\s+[^@]+@v[0-9]' .github/workflows/; then
            echo "ERROR: found actions pinned to mutable tags; pin to commit SHA"
            exit 1
          fi
          if grep -rEn 'uses:\s+[^@]+@(stable|main|master)\b' .github/workflows/; then
            echo "ERROR: found actions pinned to mutable refs; pin to commit SHA"
            exit 1
          fi
          echo "All actions pinned to SHA"

  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      scripts: ${{ steps.filter.outputs.scripts }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            code:
              - 'crates/**'
              - 'tests/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/ci.yml'
            scripts:
              - 'scripts/**'

  lint:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Format and lint
        if: needs.changes.outputs.code == 'true'
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets --all-features -- -D warnings
      - name: Skip (no code changes)
        if: needs.changes.outputs.code != 'true'
        run: echo "skipped"

  test:
    needs: changes
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        if: needs.changes.outputs.code == 'true'
        with:
          tool: cargo-nextest@0.9.138
      - name: Run tests
        if: needs.changes.outputs.code == 'true'
        run: cargo nextest run --all-features
      - name: Skip (no code changes)
        if: needs.changes.outputs.code != 'true'
        run: echo "skipped"

  install-script-smoke:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Smoke-test install scripts
        if: needs.changes.outputs.scripts == 'true'
        run: |
          bash -n scripts/install.sh
          pwsh -NoProfile -Command '$errs=$null; [void][System.Management.Automation.Language.Parser]::ParseFile("scripts/install.ps1", [ref]$null, [ref]$errs); if ($errs) { exit 1 }'
      - name: Skip (no script changes)
        if: needs.changes.outputs.scripts != 'true'
        run: echo "skipped"

  release-prep-check:
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Require changelog when workspace version changes
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if ! git diff "$base" "$head" -- Cargo.toml | grep -q '^[+-].*version'; then
            echo "Cargo.toml version unchanged — skip changelog check"
            exit 0
          fi
          new_version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          changelog="docs/changelogs/v${new_version}.md"
          if git diff --name-only "$base" "$head" | grep -Fxq "$changelog"; then
            echo "Found $changelog in PR"
            exit 0
          fi
          echo "ERROR: Cargo.toml version bumped to ${new_version} but ${changelog} not added in this PR"
          exit 1

  audit:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: 1.88.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        if: needs.changes.outputs.code == 'true'
        with:
          tool: cargo-audit@0.22.2
      - name: Run cargo audit
        if: needs.changes.outputs.code == 'true'
        run: cargo audit
      - name: Skip (no code changes)
        if: needs.changes.outputs.code != 'true'
        run: echo "skipped"
