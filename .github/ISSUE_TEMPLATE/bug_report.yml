name: Bug report
description: Report a problem with kprun
title: "[bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: kprun version
      description: Output of `kprun --version`
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Commands and config (redact secrets)
      placeholder: |
        1. kprun init ...
        2. kprun run ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / additional context
      description: stderr output, audit log excerpts (no secret values)
